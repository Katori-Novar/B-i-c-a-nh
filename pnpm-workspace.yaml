packages:
  - .

allowBuilds:
  '@firebase/util': true
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  prisma: true
  protobufjs: true
  unrs-resolver: true

onlyBuiltDependencies:
  - '@firebase/util'
  - '@nestjs/core'
  - '@prisma/client'
  - '@prisma/engines'
  - prisma
  - protobufjs
  - unrs-resolver
